<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Register Face
</title>

<link rel="stylesheet"
href="style.css">

<script defer
src="https://cdn.jsdelivr.net/npm/face-api.js"></script>

<script defer
src="api-config.js"></script>

<script defer
src="script.js"></script>

</head>

<body
onload="initRegister()">

<div class="page-container">

<div class="top-bar">

<a href="index.html"
class="back-btn">

← Home

</a>

<h1>
👤 Register Face
</h1>

</div>

<div class="camera-card">

<video
id="video"
autoplay
muted
playsinline>
</video>

<canvas
id="canvas">
</canvas>

<select
id="employeeSelect"
class="input">

<option value="">
เลือกพนักงาน
</option>

</select>

<input
type="text"
id="name"
class="input"
placeholder="Name"
readonly>

<input
type="text"
id="department"
class="input"
placeholder="Department"
readonly>

<input
type="text"
id="team"
class="input"
placeholder="Team"
readonly>

<input
type="text"
id="shift"
class="input"
placeholder="Shift"
readonly>

<button
class="main-btn"
onclick="saveFace()">

💾 Save Face

</button>

<div
id="status"
class="status-box">

Loading...

</div>

</div>

</div>

</body>
</html>
