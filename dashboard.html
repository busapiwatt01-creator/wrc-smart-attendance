<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Dashboard
</title>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<div class="page">

<a
href="index.html"
class="back-btn"
>

← Home

</a>

<div class="page-title">
📊 Attendance Dashboard
</div>

<div class="summary-grid">

<div class="summary-card">

<h3 id="totalEmployee">
0
</h3>

<p>
Employees
</p>

</div>

<div class="summary-card">

<h3 id="totalScan">
0
</h3>

<p>
Total Scan
</p>

</div>

<div class="summary-card">

<h3 id="todayIn">
0
</h3>

<p>
IN
</p>

</div>

<div class="summary-card">

<h3 id="todayOut">
0
</h3>

<p>
OUT
</p>

</div>

</div>

<div class="filter-box">

<input
type="date"
id="filterDate"
>

<select id="filterDepartment">

<option value="">
All Department
</option>

</select>

<button onclick="loadDashboard()">
Refresh
</button>

</div>

<div class="dashboard-card">

<table>

<thead>

<tr>

<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Team</th>
<th>Type</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="api-config.js"></script>
<script src="script.js"></script>

<script>

loadDashboard();

</script>

</body>
</html>
