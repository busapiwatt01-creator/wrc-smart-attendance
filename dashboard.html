<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="api-config.js"></script>

</head>

<body>

<div class="page">

<div class="topbar">

<a href="index.html" class="home-btn">
← Home
</a>

<h1>
📊 Attendance Dashboard
</h1>

</div>

<div class="stats-grid">

<div class="stat-card">

<h2 id="empCount">
0
</h2>

<p>Employees</p>

</div>

<div class="stat-card">

<h2 id="scanCount">
0
</h2>

<p>Total Scan</p>

</div>

<div class="stat-card">

<h2 id="inCount">
0
</h2>

<p>IN</p>

</div>

<div class="stat-card">

<h2 id="outCount">
0
</h2>

<p>OUT</p>

</div>

</div>

<div class="filter-box">

<input type="date" id="filterDate">

<select id="filterDept">

<option value="">
All Department
</option>

</select>

<button onclick="loadDashboard()">
Refresh
</button>

</div>

<div class="table-card">

<table>

<thead>

<tr>

<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Team</th>
<th>Shift</th>
<th>Type</th>
<th>Status</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="script.js"></script>

<script>

loadDashboard();

</script>

</body>
</html>
